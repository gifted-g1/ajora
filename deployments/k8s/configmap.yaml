
apiVersion: v1
kind: ConfigMap
metadata:
  name: ajora-config
  namespace: ajora-production
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ajora
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  JWT_EXPIRY: "1h"
  REFRESH_EXPIRY: "168h"
  LOG_LEVEL: "info"
  RATE_LIMIT: "100"
  POLYGON_RPC_URL: "https://polygon-mainnet.g.alchemy.com/v2/"

